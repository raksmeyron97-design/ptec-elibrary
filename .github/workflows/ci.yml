name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # The toolchain (vitest 4 / rolldown, vite 8, pdfjs-dist, oxlint) requires
        # Node >=20; Node 18 lacks node:util's styleText and crashes vitest.
        node-version: 22
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Type Check
      run: npx tsc --noEmit
      
    - name: Lint
      run: npm run lint
      
    - name: Unit Tests
      run: npx vitest run
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run E2E Tests
      env:
        NEXT_PUBLIC_SUPABASE_URL: "https://your-project-id.supabase.co"
        NEXT_PUBLIC_SUPABASE_ANON_KEY: "your_supabase_anon_key"
        NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      run: npx playwright test
