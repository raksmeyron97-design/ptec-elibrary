name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# A newer push to the same branch/PR supersedes the running CI — cancel it
# instead of letting both bill Actions minutes (Playwright runs are the
# expensive part). main pushes are never cancelled mid-run.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  # Scan the full git history for committed secrets on every push.
  # If this ever fires on a real secret: rotate it first, then clean history.
  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # On pull_request events gitleaks-action lists the PR's commits via the
      # API; without this the job 403s ("Resource not accessible by
      # integration") before scanning anything.
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # On PRs, block newly-introduced dependencies with known vulnerabilities.
  # Requires the dependency graph — free on public repos, GHAS-only on
  # private ones (it failed every PR while this repo was private).
  dependency-review:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        # The toolchain (vitest 4 / rolldown, vite 8, pdfjs-dist, oxlint) requires
        # Node >=20; Node 18 lacks node:util's styleText and crashes vitest.
        node-version: 22
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci

    # Fail on high/critical advisories in production dependencies only —
    # dev-tooling advisories are noise and moderate ones are tracked manually
    # (see docs/SECURITY-OPS.md §6).
    #
    # The gate fails on advisories that can actually be fixed and warns (without
    # blocking) on those whose only remedy is a semver-major bump of a framework
    # dependency. A bare `npm audit --audit-level=high` blocked every PR in the
    # repo on 2026-07-22 over `sharp` CVEs reachable only through `next`, where
    # npm's proposed fix was Next 16 → 9.3.3. See scripts/audit-gate.mjs.
    - name: Audit production dependencies
      run: node scripts/audit-gate.mjs

    # /hero/* ships with a 1-year immutable Cache-Control header — fail fast
    # if public/ptec-library.jpg changed without regenerating the variants
    # (see scripts/optimize-hero.mjs for the maintenance rule).
    - name: Hero image cache safety
      run: npm run check:hero

    - name: Type Check
      # tsc needs > the ~2GB default heap on this codebase; the runner has 7GB.
      # Verified locally: passes cleanly at 4GB (OOM'd CI at default).
      env:
        NODE_OPTIONS: --max-old-space-size=4096
      run: npx tsc --noEmit
      
    - name: Lint
      run: npm run lint
      
    - name: Unit Tests
      run: npx vitest run

  # Playwright suite against a REAL database: a local Supabase stack is
  # booted in the runner, the full migration chain is applied from the
  # squashed baseline (which doubles as a fresh-apply test of every new
  # migration), and supabase/seed.sql provides the published content the
  # public pages need. No hosted credentials are involved.
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - uses: supabase/setup-cli@v1
      with:
        version: latest

    - name: Start local Supabase (applies migrations + seed)
      run: supabase start -x studio,imgproxy,logflare,vector

    - name: Export local Supabase credentials
      run: |
        eval "$(supabase status -o env)"
        {
          echo "NEXT_PUBLIC_SUPABASE_URL=$API_URL"
          echo "NEXT_PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY"
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY"
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000"
        } >> "$GITHUB_ENV"

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run E2E Tests
      run: npx playwright test

    - name: Upload Playwright report on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 7
