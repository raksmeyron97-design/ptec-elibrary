name: Scheduled File Health Check

on:
  schedule:
    # Run every Sunday at midnight UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    # Allows you to trigger it manually from the Actions tab

jobs:
  check-file-health:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci

      - name: Run File Health Check
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Uncomment and configure these if you still have legacy bare-key file_urls in R2
          # R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          # R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          # R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          # R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: npx tsx scripts/check-file-health.ts
