  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

;\"><\u002Fdiv>\n<\u002Fsection>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:800},&quot;motion&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Animation&quot;},&quot;showPhoto&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Animation&quot;},&quot;density&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Sparse&quot;,&quot;Balanced&quot;,&quot;Dense&quot;],&quot;default&quot;:&quot;Dense&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Animation&quot;},&quot;accent&quot;:{&quot;editor&quot;:&quot;color&quot;,&quot;options&quot;:[&quot;#22D3EE&quot;,&quot;#F59E0B&quot;,&quot;#8AA4E4&quot;],&quot;default&quot;:&quot;#22D3EE&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Animation&quot;}}\">\nclass Component extends DCLogic {\n  state = { active: 0, fadeIn: true };\n\n  BOOKS = [\n    { title: \"Foundations of Pedagogy\",  author: \"Dr. Sophea Chan\", dept: \"Education\",      cv: 0 },\n    { title: \"Teaching Khmer Literature\", author: \"Vann Nath\",      dept: \"Languages\",      cv: 4 },\n    { title: \"Child Development\",         author: \"M. Sokha\",       dept: \"Psychology\",     cv: 6 },\n    { title: \"Mathematics for Educators\", author: \"R. Pich\",        dept: \"STEM\",           cv: 1 },\n    { title: \"Classroom Management\",      author: \"L. Dara\",        dept: \"Education\",      cv: 2 },\n    { title: \"Early Childhood Learning\",  author: \"S. Maly\",        dept: \"ECE\",            cv: 3 },\n    { title: \"Inclusive Education\",       author: \"T. Bopha\",       dept: \"Education\",      cv: 9 },\n    { title: \"Curriculum Design\",         author: \"K. Vireak\",      dept: \"Education\",      cv: 5 },\n  ];\n  TRENDING = [\"Teaching methods\", \"Khmer literature\", \"Early childhood\", \"Assessment\"];\n\n  // ── stable refs / handlers (created once) ─────────────────────────────\n  _focus = 0; _focusTarget = 0;\n\n  setCanvas = (el) => {\n    if (!el || el === this._canvas) return;\n    this._canvas = el;\n    this.initCanvas();\n  };\n  onFocus = () => { this._focusTarget = 1; };\n  onBlur  = () => { this._focusTarget = 0; };\n  onSubmit = (e) => e.preventDefault();\n\n  hexToRgb(hex) {\n    const h = (hex || \"#22D3EE\").replace(\"#\", \"\");\n    return [parseInt(h.slice(0,2),16), parseInt(h.slice(2,4),16), parseInt(h.slice(4,6),16)];\n  }\n\n  initCanvas() {\n    const cvs = this._canvas;\n    if (!cvs) return;\n    cancelAnimationFrame(this._raf);\n\n    const ctx = cvs.getContext(\"2d\");\n    let W = 0, H = 0, dpr = Math.min(window.devicePixelRatio || 1, 2);\n\n    const density = this.props.density ?? \"Balanced\";\n    const N = density === \"Dense\" ? 46 : density === \"Sparse\" ? 20 : 32;\n    const labels = this.TRENDING;\n\n    // nodes in normalized [0,1] space, biased left-of-centre (behind the bar)\n    const nodes = [];\n    for (let i = 0; i < N; i++) {\n      const isTerm = i < labels.length;\n      nodes.push({\n        x: isTerm ? 0.10 + Math.random() * 0.42 : Math.random(),\n        y: isTerm ? 0.32 + Math.random() * 0.44 : Math.random(),\n        vx: (Math.random() - 0.5) * 0.00035,\n        vy: (Math.random() - 0.5) * 0.00035,\n        r: isTerm ? 3.4 : 1.1 + Math.random() * 1.4,\n        isTerm,\n        label: isTerm ? labels[i] : null,\n        tw: Math.random() * Math.PI * 2, // twinkle phase\n      });\n    }\n\n    const resize = () => {\n      W = cvs.clientWidth; H = cvs.clientHeight;\n      cvs.width = W * dpr; cvs.height = H * dpr;\n      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);\n    };\n    resize();\n    this._resize = resize;\n    window.addEventListener(\"resize\", resize);\n\n    const reduce = window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n    const still = reduce || this.props.motion === false;\n\n    const draw = () => {\n      const [ar, ag, ab] = this.hexToRgb(this.props.accent);\n      // ease focus toward target\n      this._focus += (this._focusTarget - this._focus) * 0.08;\n      const f = this._focus;\n      const e = 0.32 + 0.68 * f;              // ambient floor so it's always visible\n      const linkDist = (0.13 + 0.09 * f) * Math.min(W, H);\n\n      if (!still) {\n        for (const n of nodes) {\n          n.x += n.vx; n.y += n.vy; n.tw += 0.02;\n          if (n.isTerm) {\n            // term nodes bounce within a padded band so their labels stay inset\n            if (n.x < 0.06) { n.x = 0.06; n.vx = Math.abs(n.vx); }\n            if (n.x > 0.58) { n.x = 0.58; n.vx = -Math.abs(n.vx); }\n            if (n.y < 0.16) { n.y = 0.16; n.vy = Math.abs(n.vy); }\n            if (n.y > 0.84) { n.y = 0.84; n.vy = -Math.abs(n.vy); }\n          } else {\n            if (n.x < -0.02) n.x = 1.02; if (n.x > 1.02) n.x = -0.02;\n            if (n.y < -0.02) n.y = 1.02; if (n.y > 1.02) n.y = -0.02;\n          }\n        }\n      }\n\n      ctx.clearRect(0, 0, W, H);\n\n      // links\n      for (let i = 0; i < nodes.length; i++) {\n        const a = nodes[i];\n        for (let j = i + 1; j < nodes.length; j++) {\n          const b = nodes[j];\n          const dx = (a.x - b.x) * W, dy = (a.y - b.y) * H;\n          const d = Math.hypot(dx, dy);\n          if (d < linkDist) {\n            const bond = (a.isTerm || b.isTerm) ? 1.4 : 1;\n            const alpha = (1 - d / linkDist) * (0.06 + 0.42 * f) * bond;\n            ctx.strokeStyle = `rgba(${ar},${ag},${ab},${alpha})`;\n            ctx.lineWidth = 1;\n            ctx.beginPath();\n            ctx.moveTo(a.x * W, a.y * H);\n            ctx.lineTo(b.x * W, b.y * H);\n            ctx.stroke();\n          }\n        }\n      }\n\n      // nodes\n      for (const n of nodes) {\n        const px = n.x * W, py = n.y * H;\n        const twk = 0.72 + 0.28 * Math.sin(n.tw);\n        if (n.isTerm) {\n          const g = ctx.createRadialGradient(px, py, 0, px, py, 22 + 30 * f);\n          g.addColorStop(0, `rgba(${ar},${ag},${ab},${0.5 * e})`);\n          g.addColorStop(1, `rgba(${ar},${ag},${ab},0)`);\n          ctx.fillStyle = g;\n          ctx.beginPath(); ctx.arc(px, py, 22 + 30 * f, 0, Math.PI * 2); ctx.fill();\n          ctx.fillStyle = `rgba(255,255,255,${0.8 * e})`;\n          ctx.beginPath(); ctx.arc(px, py, n.r, 0, Math.PI * 2); ctx.fill();\n          // label\n          if (f > 0.04) {\n            ctx.font = \"600 12px Inter, sans-serif\";\n            const tw = ctx.measureText(n.label).width;\n            let lx = px + n.r + 8;\n            if (lx + tw > W - 16) lx = px - n.r - 8 - tw; // flip to the left near the right edge\n            if (lx < 16) lx = 16;                          // never let the label graze the left edge\n            ctx.fillStyle = `rgba(${ar},${ag},${ab},${Math.min(1, f * 1.1)})`;\n            ctx.shadowColor = \"rgba(0,0,0,0.6)\"; ctx.shadowBlur = 6;\n            ctx.fillText(n.label, lx, py + 4);\n            ctx.shadowBlur = 0;\n          }\n        } else {\n          ctx.fillStyle = `rgba(200,225,255,${(0.12 + 0.38 * f) * twk})`;\n          ctx.beginPath(); ctx.arc(px, py, n.r, 0, Math.PI * 2); ctx.fill();\n        }\n      }\n\n      if (still) { this._raf = null; return; }\n      this._raf = requestAnimationFrame(draw);\n    };\n\n    if (still) {\n      // resolve focus to a mid state and paint one frame\n      this._focus = 0.45;\n      draw();\n    } else {\n      this._raf = requestAnimationFrame(draw);\n    }\n  }\n\n  componentDidMount() {\n    const reduce = window.matchMedia && window.matchMedia(\"(prefers-reduced-motion: reduce)\").matches;\n    if (reduce || this.props.motion === false) return;\n    this._t = setInterval(() => {\n      this.setState({ fadeIn: false });\n      this._t2 = setTimeout(() => {\n        this.setState((s) => ({ active: (s.active + 1) % this.BOOKS.length, fadeIn: true }));\n      }, 450);\n    }, 3200);\n  }\n  componentDidUpdate(prev) {\n    if (prev.density !== this.props.density || prev.motion !== this.props.motion) this.initCanvas();\n  }\n  componentWillUnmount() {\n    clearInterval(this._t); clearTimeout(this._t2);\n    cancelAnimationFrame(this._raf);\n    if (this._resize) window.removeEventListener(\"resize\", this._resize);\n  }\n\n  renderVals() {\n    const B = this.BOOKS;\n    const withClass = (b) => ({ ...b, cvClass: \"cv-\" + b.cv });\n    const n = B.length, active = this.state.active;\n    const motion = this.props.motion !== false;\n    return {\n      trending: this.TRENDING,\n      frontBook: withClass(B[active]),\n      backA: withClass(B[(active + n - 1) % n]),\n      backB: withClass(B[(active + 1) % n]),\n      fadeClass: this.state.fadeIn ? \"cf-in\" : \"cf-out\",\n      dots: B.map((_, i) => ({ cls: i === active ? \"dot-on\" : \"dot-off\" })),\n      motionClass: motion ? \"\" : \"no-motion\",\n      askClass: \"\",\n      showPhoto: this.props.showPhoto !== false,\n      setCanvas: this.setCanvas,\n      setInput: () => {},\n      onFocus: this.onFocus,\n      onBlur: this.onBlur,\n      onSubmit: this.onSubmit,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
